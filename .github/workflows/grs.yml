name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone github-readme-stats
        run: git clone --depth 1 https://github.com/anuraghazra/github-readme-stats.git grs-src

      - name: Install dependencies
        working-directory: grs-src
        run: npm install

      - name: Start server
        working-directory: grs-src
        env:
          PAT_1: ${{ secrets.PAT_1 }}
        run: |
          node express.js &
          sleep 5

      - name: Download stats card
        run: |
          mkdir -p profile
          curl -s "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&count_private=true&commits_year=2026" -o profile/stats.svg
          curl -s "http://localhost:9000/api/top-langs?username=${{ github.repository_owner }}&layout=compact" -o profile/top-langs.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
